<!DOCTYPE html>
<html>
<body style="background:#f0f0f0;display:flex;gap:40px;padding:40px;align-items:center;font-family:Arial,sans-serif;flex-wrap:wrap;">

  <!-- Mark only -->
  <div style="text-align:center">
    <svg width="100" height="100" viewBox="0 0 100 100" fill="none">
      <rect width="100" height="100" rx="24" fill="#2D1B69"/>
      <!-- L: vertical stroke, center at x=37 -->
      <rect x="28" y="30" width="18" height="52" rx="7" fill="#FFD700"/>
      <!-- L: horizontal stroke -->
      <rect x="28" y="64" width="44" height="18" rx="7" fill="#FFD700"/>
      <!-- Glasses centered at x=50 (midpoint of L bounding box 28-72) -->
      <!-- Left lens centered exactly on L vertical stroke (cx=37) -->
      <circle cx="37" cy="22" r="10" stroke="white" stroke-width="4" fill="none"/>
      <!-- Right lens at cx=63, making pair center = (37+63)/2 = 50 -->
      <circle cx="63" cy="22" r="10" stroke="white" stroke-width="4" fill="none"/>
      <!-- Bridge -->
      <line x1="47" y1="22" x2="53" y2="22" stroke="white" stroke-width="4" stroke-linecap="round"/>
      <!-- Arms -->
      <line x1="27" y1="22" x2="20" y2="20" stroke="white" stroke-width="4" stroke-linecap="round"/>
      <line x1="73" y1="22" x2="80" y2="20" stroke="white" stroke-width="4" stroke-linecap="round"/>
    </svg>
    <p style="margin-top:8px;font-size:12px;color:#666">Icon only</p>
  </div>

  <!-- Wordmark on light -->
  <div style="background:#fff;padding:20px 30px;border-radius:16px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 12px rgba(0,0,0,0.1)">
    <svg width="60" height="60" viewBox="0 0 100 100" fill="none">
      <rect width="100" height="100" rx="24" fill="#2D1B69"/>
      <rect x="28" y="30" width="18" height="52" rx="7" fill="#FFD700"/>
      <rect x="28" y="64" width="44" height="18" rx="7" fill="#FFD700"/>
      <circle cx="37" cy="22" r="10" stroke="white" stroke-width="4" fill="none"/>
      <circle cx="63" cy="22" r="10" stroke="white" stroke-width="4" fill="none"/>
      <line x1="47" y1="22" x2="53" y2="22" stroke="white" stroke-width="4" stroke-linecap="round"/>
      <line x1="27" y1="22" x2="20" y2="20" stroke="white" stroke-width="4" stroke-linecap="round"/>
      <line x1="73" y1="22" x2="80" y2="20" stroke="white" stroke-width="4" stroke-linecap="round"/>
    </svg>
    <div style="display:flex;flex-direction:column;gap:5px;">
      <span style="font-size:34px;font-weight:900;line-height:1;letter-spacing:-1px;">
        <span style="color:#1a1035">Le</span><span style="color:#FFD700">ns</span>
      </span>
      <span style="font-size:10px;font-weight:800;letter-spacing:4px;color:#FFD700;text-transform:uppercase;">See More</span>
    </div>
  </div>

  <!-- Wordmark on dark -->
  <div style="background:#0d0823;padding:20px 30px;border-radius:16px;display:flex;align-items:center;gap:14px;">
    <svg width="60" height="60" viewBox="0 0 100 100" fill="none">
      <rect width="100" height="100" rx="24" fill="#2D1B69"/>
      <rect x="28" y="30" width="18" height="52" rx="7" fill="#FFD700"/>
      <rect x="28" y="64" width="44" height="18" rx="7" fill="#FFD700"/>
      <circle cx="37" cy="22" r="10" stroke="white" stroke-width="4" fill="none"/>
      <circle cx="63" cy="22" r="10" stroke="white" stroke-width="4" fill="none"/>
      <line x1="47" y1="22" x2="53" y2="22" stroke="white" stroke-width="4" stroke-linecap="round"/>
      <line x1="27" y1="22" x2="20" y2="20" stroke="white" stroke-width="4" stroke-linecap="round"/>
      <line x1="73" y1="22" x2="80" y2="20" stroke="white" stroke-width="4" stroke-linecap="round"/>
    </svg>
    <div style="display:flex;flex-direction:column;gap:5px;">
      <span style="font-size:34px;font-weight:900;line-height:1;letter-spacing:-1px;">
        <span style="color:#ffffff">Le</span><span style="color:#FFD700">ns</span>
      </span>
      <span style="font-size:10px;font-weight:800;letter-spacing:4px;color:#FFD700;text-transform:uppercase;">See More</span>
    </div>
  </div>

  <!-- Large size -->
  <div style="text-align:center">
    <svg width="160" height="160" viewBox="0 0 100 100" fill="none">
      <rect width="100" height="100" rx="24" fill="#2D1B69"/>
      <rect x="28" y="30" width="18" height="52" rx="7" fill="#FFD700"/>
      <rect x="28" y="64" width="44" height="18" rx="7" fill="#FFD700"/>
      <circle cx="37" cy="22" r="10" stroke="white" stroke-width="4" fill="none"/>
      <circle cx="63" cy="22" r="10" stroke="white" stroke-width="4" fill="none"/>
      <line x1="47" y1="22" x2="53" y2="22" stroke="white" stroke-width="4" stroke-linecap="round"/>
      <line x1="27" y1="22" x2="20" y2="20" stroke="white" stroke-width="4" stroke-linecap="round"/>
      <line x1="73" y1="22" x2="80" y2="20" stroke="white" stroke-width="4" stroke-linecap="round"/>
    </svg>
    <p style="margin-top:8px;font-size:12px;color:#666">Large (app icon size)</p>
  </div>

</body>
</html>
