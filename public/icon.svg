<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#07070f"/>
  <!-- Glow effect -->
  <rect width="512" height="512" rx="112" fill="url(#glow)" opacity="0.4"/>
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#07070f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- "n" lettermark -->
  <text
    x="256"
    y="370"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="320"
    font-weight="900"
    text-anchor="middle"
    fill="#c084fc"
    filter="url(#textglow)"
  >n</text>
  <defs>
    <filter id="textglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
