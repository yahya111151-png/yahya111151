<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="42%" cy="38%" r="78%">
      <stop offset="0%"   stop-color="#ffb3c6"/>
      <stop offset="100%" stop-color="#e8476a"/>
    </radialGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!--
    Letter L — two overlapping rounded white rectangles.
    Vertical stroke : x 148–240,  y  88–416  (w 92, h 328, rx 46)
    Horizontal stroke: x 148–368,  y 324–416  (w 220, h 92,  rx 46)
    Visual centre ≈ (258, 252) ≈ icon centre.
  -->
  <rect x="148" y="88"  width="92"  height="328" rx="46" fill="white" opacity="0.97"/>
  <rect x="148" y="324" width="220" height="92"  rx="46" fill="white" opacity="0.97"/>

  <!--
    Small round glasses sitting on the upper third of the L's vertical stroke.
    Centred on stroke centre-x (194).

    Left  lens : cx 162, cy 180, r 26
    Right lens : cx 226, cy 180, r 26
    Gap between inner edges: (226−26) − (162+26) = 12 px
    Bridge     : 188 → 200  at y 180
    Left  arm  : from outer edge of left  lens (136,180) → (110,189)
    Right arm  : from outer edge of right lens (252,180) → (278,189)
  -->
  <g stroke="#e8476a" stroke-width="9" stroke-linecap="round" fill="none">
    <circle cx="162" cy="180" r="26"/>
    <circle cx="226" cy="180" r="26"/>
    <line   x1="188" y1="180" x2="200" y2="180"/>
    <line   x1="136" y1="180" x2="110" y2="189"/>
    <line   x1="252" y1="180" x2="278" y2="189"/>
  </g>
</svg>
