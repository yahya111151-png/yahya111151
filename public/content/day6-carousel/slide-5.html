<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:1080px; height:1080px; overflow:hidden; background:#2D1B69; }
.slide { width:1080px; height:1080px; background:#2D1B69; position:relative; overflow:hidden; font-family:'Segoe UI Black','Arial Black',sans-serif; display:flex; flex-direction:column; justify-content:space-between; padding:64px 72px; }
.g { position:absolute; border-radius:50%; width:800px; height:800px; background:radial-gradient(circle,rgba(255,215,0,.07) 0%,transparent 70%); top:50%; left:50%; transform:translate(-50%,-50%); }
.top { display:flex; align-items:center; justify-content:space-between; position:relative; z-index:2; }
.dots { display:flex; gap:10px; }
.dot { width:12px; height:12px; border-radius:50%; background:rgba(255,215,0,.25); }
.dot.a { background:#FFD700; }
.num { font-size:18px; font-weight:700; font-family:'Segoe UI','Arial',sans-serif; color:rgba(255,215,0,.5); letter-spacing:.1em; }
.center { flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; position:relative; z-index:2; text-align:center; }
h2 { font-size:80px; font-weight:800; color:#FFD700; line-height:1.04; letter-spacing:-.025em; margin-bottom:28px; }
.sub { font-family:'Segoe UI','Arial',sans-serif; font-size:30px; color:rgba(255,255,255,.65); line-height:1.5; max-width:800px; margin-bottom:52px; }
.cta-btn { display:inline-flex; align-items:center; gap:12px; background:#FFD700; color:#2D1B69; font-family:'Segoe UI Black','Arial Black',sans-serif; font-size:32px; font-weight:800; padding:24px 56px; border-radius:16px; }
.bottom { display:flex; align-items:center; justify-content:center; position:relative; z-index:2; }
.lname { font-size:22px; font-weight:800; color:rgba(255,215,0,.4); }
</style></head><body>
<div class="slide">
  <div class="g"></div>
  <div class="top">
    <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot a"></div></div>
    <span class="num">05 / 05</span>
  </div>
  <div class="center">
    <h2>Start building<br/>your Lens<br/>reputation.</h2>
    <p class="sub">Be seen for who you really are. Join Lens free and let your impression open doors.</p>
    <div class="cta-btn">Try Lens free →</div>
  </div>
  <div class="bottom"><span class="lname">Lens</span></div>
</div>
</body></html>
