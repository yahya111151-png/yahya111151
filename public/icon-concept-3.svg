<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    Concept 3 — "Stars & Smile"
    One big central star + two smaller flanking stars,
    a wide smile arc below them — reads as a happy "face" made of stars.
  -->
  <defs>
    <radialGradient id="bg3" cx="50%" cy="42%" r="76%">
      <stop offset="0%"   stop-color="#ff8fab"/>
      <stop offset="100%" stop-color="#c93060"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg3)"/>

  <!--
    Centre star — cx=256, cy=178, outer R=58, inner r=24.

    Outer (R=58):
      Top    (256, 120)
      –18°   (256+55.2, 178–17.9)  = (311.2, 160.1)
      +54°   (256+34.1, 178+46.9)  = (290.1, 224.9)
      +126°  (256–34.1, 178+46.9)  = (221.9, 224.9)
      +198°  (256–55.2, 178–17.9)  = (200.8, 160.1)

    Inner (r=24):
      –54°   (256+14.1, 178–19.4)  = (270.1, 158.6)
      +18°   (256+22.8, 178+ 7.4)  = (278.8, 185.4)
      +90°   (256,      178+24)     = (256,   202)
      +162°  (256–22.8, 178+ 7.4)  = (233.2, 185.4)
      +234°  (256–14.1, 178–19.4)  = (241.9, 158.6)
  -->
  <polygon
    points="256,120 270.1,158.6 311.2,160.1 278.8,185.4 290.1,224.9 256,202 221.9,224.9 233.2,185.4 200.8,160.1 241.9,158.6"
    fill="white"
    opacity="0.97"
  />

  <!--
    Left star — cx=160, cy=218, outer R=34, inner r=14.

    Outer (R=34):
      Top    (160, 184)
      –18°   (160+32.3, 218–10.5)  = (192.3, 207.5)
      +54°   (160+20.0, 218+27.5)  = (180.0, 245.5)
      +126°  (160–20.0, 218+27.5)  = (140.0, 245.5)
      +198°  (160–32.3, 218–10.5)  = (127.7, 207.5)

    Inner (r=14):
      –54°   (160+ 8.2, 218–11.3)  = (168.2, 206.7)
      +18°   (160+13.3, 218+ 4.3)  = (173.3, 222.3)
      +90°   (160,      218+14)     = (160,   232)
      +162°  (160–13.3, 218+ 4.3)  = (146.7, 222.3)
      +234°  (160– 8.2, 218–11.3)  = (151.8, 206.7)
  -->
  <polygon
    points="160,184 168.2,206.7 192.3,207.5 173.3,222.3 180,245.5 160,232 140,245.5 146.7,222.3 127.7,207.5 151.8,206.7"
    fill="white"
    opacity="0.86"
  />

  <!--
    Right star — mirror of left star across x=256 (cx=352, cy=218).
    x-coords: 512 – left_x values.
  -->
  <polygon
    points="352,184 343.8,206.7 319.7,207.5 338.7,222.3 332,245.5 352,232 372,245.5 365.3,222.3 384.3,207.5 360.2,206.7"
    fill="white"
    opacity="0.86"
  />

  <!--
    Smile arc — quadratic bezier from (118,302) through control (256,416) to (394,302).
    Midpoint of curve at t=0.5: x=256, y≈359. Wide, generous smile.
  -->
  <path
    d="M 118,302 Q 256,416 394,302"
    stroke="white"
    stroke-width="44"
    stroke-linecap="round"
    fill="none"
    opacity="0.97"
  />
</svg>
