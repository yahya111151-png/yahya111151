<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>Humor</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:1080px; height:1080px; overflow:hidden; background:#FFD700; }
.slide { width:1080px; height:1080px; background:#FFD700; position:relative; overflow:hidden; font-family:'Segoe UI Black','Arial Black',sans-serif; display:flex; flex-direction:column; justify-content:space-between; padding:72px; }
.blob { position:absolute; border-radius:50%; background:#2D1B69; opacity:.05; pointer-events:none; }
.b1 { width:600px; height:600px; top:-180px; right:-150px; }
.top { display:flex; align-items:center; justify-content:space-between; position:relative; z-index:2; }
.num { font-family:'Segoe UI','Arial',sans-serif; font-size:18px; font-weight:600; color:rgba(45,27,105,.45); letter-spacing:.1em; }
.type-badge { background:rgba(45,27,105,.1); border:1.5px solid rgba(45,27,105,.2); color:#2D1B69; font-family:'Segoe UI','Arial',sans-serif; font-size:16px; font-weight:600; padding:8px 20px; border-radius:100px; text-transform:uppercase; letter-spacing:.1em; }
.center { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; position:relative; z-index:2; }
.emoji { font-size:100px; line-height:1; margin-bottom:28px; display:block; }
h1 { font-size:96px; font-weight:800; color:#2D1B69; line-height:1.0; letter-spacing:-.03em; margin-bottom:20px; }
.bar { width:56px; height:5px; background:#2D1B69; border-radius:3px; margin:0 auto 28px; opacity:.3; }
.desc { font-family:'Segoe UI','Arial',sans-serif; font-size:26px; color:rgba(45,27,105,.7); line-height:1.5; max-width:680px; }
.bottom { display:flex; align-items:center; justify-content:space-between; position:relative; z-index:2; }
.scale { font-family:'Segoe UI','Arial',sans-serif; font-size:18px; color:rgba(45,27,105,.4); }
.lname { font-family:'Segoe UI Black','Arial Black',sans-serif; font-size:22px; font-weight:800; color:rgba(45,27,105,.4); }
</style></head><body>
<div class="slide">
  <div class="blob b1"></div>
  <div class="top"><span class="num">03 / 08</span><span class="type-badge">Personal</span></div>
  <div class="center">
    <span class="emoji">😄</span>
    <h1>Humor</h1>
    <div class="bar"></div>
    <p class="desc">Do they make people laugh in a genuine, warm way? Humor reveals a lot about how someone connects with others.</p>
  </div>
  <div class="bottom"><span class="scale">Rated −5 to +5</span><span class="lname">Lens</span></div>
</div>
</body></html>
