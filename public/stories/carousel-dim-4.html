<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>Honesty</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:1080px; height:1080px; overflow:hidden; background:#0d0823; }
.slide { width:1080px; height:1080px; background:#0d0823; position:relative; overflow:hidden; font-family:'Segoe UI Black','Arial Black',sans-serif; display:flex; flex-direction:column; justify-content:space-between; padding:72px; }
.g { position:absolute; border-radius:50%; pointer-events:none; width:700px; height:700px; background:radial-gradient(circle,rgba(45,27,105,.85) 0%,transparent 70%); top:0; left:50%; transform:translateX(-50%); }
.top { display:flex; align-items:center; justify-content:space-between; position:relative; z-index:2; }
.num { font-family:'Segoe UI','Arial',sans-serif; font-size:18px; font-weight:600; color:rgba(255,215,0,.5); letter-spacing:.1em; }
.type-badge { background:rgba(255,215,0,.1); border:1.5px solid rgba(255,215,0,.22); color:#FFD700; font-family:'Segoe UI','Arial',sans-serif; font-size:16px; font-weight:600; padding:8px 20px; border-radius:100px; text-transform:uppercase; letter-spacing:.1em; }
.center { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; position:relative; z-index:2; }
.emoji { font-size:100px; line-height:1; margin-bottom:28px; display:block; }
h1 { font-size:96px; font-weight:800; color:#FFD700; line-height:1.0; letter-spacing:-.03em; margin-bottom:20px; }
.bar { width:56px; height:5px; background:#FFD700; border-radius:3px; margin:0 auto 28px; opacity:.5; }
.desc { font-family:'Segoe UI','Arial',sans-serif; font-size:26px; color:rgba(255,255,255,.62); line-height:1.5; max-width:680px; }
.bottom { display:flex; align-items:center; justify-content:space-between; position:relative; z-index:2; }
.scale { font-family:'Segoe UI','Arial',sans-serif; font-size:18px; color:rgba(255,255,255,.3); }
.lname { font-family:'Segoe UI Black','Arial Black',sans-serif; font-size:22px; font-weight:800; color:rgba(255,215,0,.4); }
</style></head><body>
<div class="slide">
  <div class="g"></div>
  <div class="top"><span class="num">04 / 08</span><span class="type-badge">Personal</span></div>
  <div class="center">
    <span class="emoji">🫂</span>
    <h1>Honesty</h1>
    <div class="bar"></div>
    <p class="desc">Do they tell the truth even when it's uncomfortable? Honesty is rare — and the people around someone always know if it's there.</p>
  </div>
  <div class="bottom"><span class="scale">Rated −5 to +5</span><span class="lname">Lens</span></div>
</div>
</body></html>
