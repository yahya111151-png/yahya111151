<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Slide 1</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:1080px; height:1920px; overflow:hidden; background:#2D1B69; }
.slide {
  width:1080px; height:1920px; background:#2D1B69;
  position:relative; overflow:hidden;
  font-family:'Segoe UI Black','Arial Black',sans-serif;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
}
.circ {
  position:absolute; border-radius:50%;
  background:#FFD700; opacity:.07; pointer-events:none;
}
.c1 { width:700px; height:700px; top:-180px; right:-180px; }
.c2 { width:480px; height:480px; bottom:-120px; left:-140px; }
.content { position:relative; z-index:2; text-align:center; width:840px; }
.wave { font-size:68px; line-height:1; margin-bottom:24px; display:block; }
.eye {
  font-family:'Segoe UI','Arial',sans-serif; font-size:20px; font-weight:600;
  color:#FFD700; letter-spacing:.2em; text-transform:uppercase;
  margin-bottom:28px; display:block;
}
h1 {
  font-size:88px; font-weight:800; color:#fff;
  line-height:1.04; letter-spacing:-.02em; margin-bottom:28px;
}
h1 em { font-style:normal; color:#FFD700; display:block; }
.bar { width:64px; height:6px; background:#FFD700; border-radius:3px; margin:0 auto 32px; }
.sub {
  font-family:'Segoe UI','Arial',sans-serif; font-size:26px;
  color:rgba(255,255,255,.58); line-height:1.55; max-width:660px; margin:0 auto;
}
.sub strong { color:rgba(255,255,255,.9); font-weight:600; }
.logo {
  position:absolute; bottom:52px; left:50%; transform:translateX(-50%);
  display:flex; align-items:center; gap:10px; z-index:2;
}
.lbox {
  width:38px; height:38px; background:#FFD700; border-radius:9px;
  display:flex; align-items:center; justify-content:center;
}
.lname { font-size:30px; font-weight:800; color:#FFD700; }
</style>
</head>
<body>
<div class="slide">
  <div class="circ c1"></div><div class="circ c2"></div>
  <div class="content">
    <span class="wave">👋</span>
    <span class="eye">think about it</span>
    <h1>do you really<br/><em>know</em><br/>the people<br/>around you?</h1>
    <div class="bar"></div>
    <p class="sub">Everyone shows you a <strong>version</strong> of themselves.<br/>Lens shows you the <strong>real one.</strong></p>
  </div>
  <div class="logo">
    <div class="lbox">
      <svg width="22" height="22" viewBox="0 0 512 512" fill="none">
        <rect x="148" y="88" width="92" height="328" rx="46" fill="#2D1B69"/>
        <rect x="148" y="324" width="220" height="92" rx="46" fill="#2D1B69"/>
      </svg>
    </div>
    <span class="lname">Lens</span>
  </div>
</div>
</body>
</html>
