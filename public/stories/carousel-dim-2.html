<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>Friendship</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:1080px; height:1080px; overflow:hidden; background:#1a0e47; }
.slide { width:1080px; height:1080px; background:linear-gradient(135deg,#1a0e47,#2D1B69); position:relative; overflow:hidden; font-family:'Segoe UI Black','Arial Black',sans-serif; display:flex; flex-direction:column; justify-content:space-between; padding:72px; }
.dots { position:absolute; inset:0; background-image:radial-gradient(circle,rgba(255,215,0,.07) 2px,transparent 2px); background-size:56px 56px; pointer-events:none; }
.top { display:flex; align-items:center; justify-content:space-between; position:relative; z-index:2; }
.num { font-family:'Segoe UI','Arial',sans-serif; font-size:18px; font-weight:600; color:rgba(255,215,0,.5); letter-spacing:.1em; }
.type-badge { background:rgba(255,215,0,.12); border:1.5px solid rgba(255,215,0,.25); color:#FFD700; font-family:'Segoe UI','Arial',sans-serif; font-size:16px; font-weight:600; padding:8px 20px; border-radius:100px; text-transform:uppercase; letter-spacing:.1em; }
.center { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; position:relative; z-index:2; }
.emoji { font-size:100px; line-height:1; margin-bottom:28px; display:block; }
h1 { font-size:96px; font-weight:800; color:#FFD700; line-height:1.0; letter-spacing:-.03em; margin-bottom:20px; }
.bar { width:56px; height:5px; background:#FFD700; border-radius:3px; margin:0 auto 28px; opacity:.5; }
.desc { font-family:'Segoe UI','Arial',sans-serif; font-size:26px; color:rgba(255,255,255,.65); line-height:1.5; max-width:680px; }
.bottom { display:flex; align-items:center; justify-content:space-between; position:relative; z-index:2; }
.scale { font-family:'Segoe UI','Arial',sans-serif; font-size:18px; color:rgba(255,255,255,.35); }
.lname { font-family:'Segoe UI Black','Arial Black',sans-serif; font-size:22px; font-weight:800; color:rgba(255,215,0,.45); }
</style></head><body>
<div class="slide">
  <div class="dots"></div>
  <div class="top"><span class="num">02 / 08</span><span class="type-badge">Personal</span></div>
  <div class="center">
    <span class="emoji">🤝</span>
    <h1>Friendship</h1>
    <div class="bar"></div>
    <p class="desc">Are they a real friend? The kind who shows up, listens, and has your back — or just someone who's around when it's convenient?</p>
  </div>
  <div class="bottom"><span class="scale">Rated −5 to +5</span><span class="lname">Lens</span></div>
</div>
</body></html>
