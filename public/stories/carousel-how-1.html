<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>How it Works — Step 1</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:1080px; height:1080px; overflow:hidden; background:#2D1B69; }
.slide { width:1080px; height:1080px; background:#2D1B69; position:relative; overflow:hidden; font-family:'Segoe UI Black','Arial Black',sans-serif; display:flex; flex-direction:column; justify-content:space-between; padding:64px 72px; }
.circ { position:absolute; border-radius:50%; background:#FFD700; opacity:.06; pointer-events:none; }
.c1 { width:600px; height:600px; top:-160px; right:-160px; }
.top { display:flex; align-items:center; justify-content:space-between; position:relative; z-index:2; }
.steps { display:flex; gap:12px; }
.step { width:40px; height:7px; border-radius:4px; background:rgba(255,215,0,.25); }
.step.a { background:#FFD700; }
.step-label { font-family:'Segoe UI','Arial',sans-serif; font-size:18px; font-weight:600; color:rgba(255,215,0,.5); letter-spacing:.1em; }
.center { flex:1; display:flex; flex-direction:column; justify-content:center; position:relative; z-index:2; }
.step-num { font-size:120px; font-weight:800; color:rgba(255,215,0,.12); line-height:1; margin-bottom:-20px; }
h1 { font-size:80px; font-weight:800; color:#FFD700; line-height:1.02; letter-spacing:-.025em; margin-bottom:24px; }
.desc { font-family:'Segoe UI','Arial',sans-serif; font-size:28px; color:rgba(255,255,255,.65); line-height:1.5; max-width:760px; }
.desc strong { color:#fff; font-weight:600; }
.icon-row { display:flex; gap:16px; margin-top:36px; }
.icon-chip { display:flex; align-items:center; gap:10px; background:rgba(255,215,0,.1); border:1.5px solid rgba(255,215,0,.2); border-radius:100px; padding:10px 22px; font-family:'Segoe UI','Arial',sans-serif; font-size:18px; color:#FFD700; font-weight:600; }
.bottom { display:flex; align-items:center; justify-content:space-between; position:relative; z-index:2; }
.next { font-family:'Segoe UI','Arial',sans-serif; font-size:18px; color:rgba(255,215,0,.45); }
.lname { font-family:'Segoe UI Black','Arial Black',sans-serif; font-size:22px; font-weight:800; color:rgba(255,215,0,.45); }
</style></head><body>
<div class="slide">
  <div class="circ c1"></div>
  <div class="top">
    <div class="steps"><div class="step"></div><div class="step a"></div><div class="step"></div><div class="step"></div></div>
    <span class="step-label">Step 1 of 3</span>
  </div>
  <div class="center">
    <p class="step-num">01</p>
    <h1>Find someone<br/>you know.</h1>
    <p class="desc">Search by name, scan their QR code, or browse people near you. <strong>Anyone on Lens</strong> can be looked up instantly.</p>
    <div class="icon-row">
      <div class="icon-chip">🔍 Search by name</div>
      <div class="icon-chip">📱 Scan QR code</div>
      <div class="icon-chip">📍 Nearby</div>
    </div>
  </div>
  <div class="bottom"><span class="next">next: share your thoughts →</span><span class="lname">Lens</span></div>
</div>
</body></html>
