<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Post 1 — Launch</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:1080px; height:1080px; overflow:hidden; background:#2D1B69; }
.slide {
  width:1080px; height:1080px; background:#2D1B69;
  position:relative; overflow:hidden; font-family:'Segoe UI Black','Arial Black',sans-serif;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
}
.circ { position:absolute; border-radius:50%; background:#FFD700; opacity:.07; pointer-events:none; }
.c1 { width:800px; height:800px; top:-250px; right:-250px; }
.c2 { width:500px; height:500px; bottom:-150px; left:-150px; }
.content { position:relative; z-index:2; text-align:center; width:860px; }
.badge {
  display:inline-flex; align-items:center; gap:8px;
  background:rgba(255,215,0,.12); border:1.5px solid rgba(255,215,0,.3);
  color:#FFD700; font-family:'Segoe UI','Arial',sans-serif; font-size:18px; font-weight:600;
  padding:10px 28px; border-radius:100px; letter-spacing:.06em; text-transform:uppercase;
  margin-bottom:32px;
}
h1 { font-size:80px; font-weight:800; color:#fff; line-height:1.02; letter-spacing:-.025em; margin-bottom:28px; }
h1 em { font-style:normal; color:#FFD700; }
.sub { font-family:'Segoe UI','Arial',sans-serif; font-size:24px; color:rgba(255,255,255,.58); line-height:1.55; max-width:680px; margin:0 auto 40px; }
.sub strong { color:rgba(255,255,255,.9); }
.pills { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-bottom:40px; }
.pill { background:rgba(255,215,0,.1); border:1.5px solid rgba(255,215,0,.25); color:#FFD700; font-family:'Segoe UI','Arial',sans-serif; font-size:18px; font-weight:600; padding:10px 24px; border-radius:100px; }
.cta { display:inline-flex; align-items:center; gap:10px; background:#FFD700; color:#2D1B69; font-family:'Segoe UI Black','Arial Black',sans-serif; font-size:26px; font-weight:800; padding:18px 44px; border-radius:14px; }
.logo { position:absolute; bottom:36px; right:44px; display:flex; align-items:center; gap:8px; z-index:2; }
.lbox { width:32px; height:32px; background:#FFD700; border-radius:8px; display:flex; align-items:center; justify-content:center; }
.lname { font-size:24px; font-weight:800; color:#FFD700; }
</style>
</head>
<body>
<div class="slide">
  <div class="circ c1"></div><div class="circ c2"></div>
  <div class="content">
    <div class="badge">👁️ Introducing Lens</div>
    <h1>see through<br/>people.<br/><em>know them truly.</em></h1>
    <p class="sub">Anonymous reflections from the people who know them — across <strong>8 dimensions</strong> of who someone really is.</p>
    <div class="pills">
      <span class="pill">Anonymous</span>
      <span class="pill">Honest</span>
      <span class="pill">Weighted by closeness</span>
    </div>
    <div class="cta">Get started free →</div>
  </div>
  <div class="logo">
    <div class="lbox"><svg width="18" height="18" viewBox="0 0 512 512" fill="none"><rect x="148" y="88" width="92" height="328" rx="46" fill="#2D1B69"/><rect x="148" y="324" width="220" height="92" rx="46" fill="#2D1B69"/></svg></div>
    <span class="lname">Lens</span>
  </div>
</div>
</body>
</html>
