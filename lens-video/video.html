<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:1080px; height:1920px; overflow:hidden; background:#0d0823; }
  .scene {
    width:1080px; height:1920px; position:relative; overflow:hidden;
    font-family:'Segoe UI Black','Arial Black',sans-serif;
    background:#0d0823;
  }
  .bg-glow {
    position:absolute; border-radius:50%; pointer-events:none;
    width:1100px; height:1100px;
    background:radial-gradient(circle, #2D1B69 0%, rgba(45,27,105,0.4) 40%, transparent 70%);
    top:50%; left:50%; transform:translate(-50%,-50%);
    opacity:0; transition:opacity 1s ease;
  }

  /* ── Fade/slide utility ── */
  .el {
    position:absolute; opacity:0; transform:translateY(36px);
    transition: opacity 0.65s ease, transform 0.65s ease;
    text-align:center; left:0; width:1080px; padding:0 80px;
  }
  .el.in  { opacity:1; transform:translateY(0); }
  .el.out { opacity:0; transform:translateY(-36px); transition-duration:0.4s; }

  /* ── Scene 1 ── */
  #s1eyebrow {
    top:570px;
    font-family:'Segoe UI','Arial',sans-serif;
    font-size:28px; font-weight:700; color:#FFD700;
    letter-spacing:0.2em; text-transform:uppercase;
  }
  #s1a {
    top:620px;
    font-size:120px; font-weight:800; color:#fff;
    line-height:1.02; letter-spacing:-0.025em;
  }
  #s1b {
    top:980px;
    font-size:120px; font-weight:800; color:#fff;
    line-height:1.02; letter-spacing:-0.025em;
    transition-delay:0.18s;
  }
  #s1b em { font-style:normal; color:#FFD700; }
  .bar-el {
    position:absolute; left:50%; transform:translateX(-50%);
    width:80px; height:7px; background:#FFD700; border-radius:4px;
    top:965px; opacity:0; transition:opacity 0.5s ease 0.3s;
  }
  .bar-el.in { opacity:1; }
  .bar-el.out { opacity:0; }

  /* ── Scene 2: names ── */
  #namesBlock {
    position:absolute; top:580px; left:0; width:1080px;
    padding:0 90px; opacity:0; transform:translateY(28px);
    transition:opacity 0.6s ease, transform 0.6s ease;
  }
  #namesBlock.in  { opacity:1; transform:translateY(0); }
  #namesBlock.out { opacity:0; transform:translateY(-28px); transition-duration:0.4s; }

  .name-row {
    display:flex; align-items:baseline; gap:18px; margin-bottom:28px;
    opacity:0; transform:translateX(-16px);
    transition:opacity 0.5s ease, transform 0.5s ease;
  }
  .name-row.in { opacity:1; transform:translateX(0); }
  .person { font-size:88px; font-weight:800; color:#fff; letter-spacing:-0.02em; }
  .trait  { font-family:'Segoe UI','Arial',sans-serif; font-size:34px; font-weight:600; color:#FFD700; }

  /* ── Scene 3 ── */
  #s3a { top:680px; font-size:108px; font-weight:800; color:#fff; line-height:1.04; letter-spacing:-0.025em; }
  #s3b { top:910px; font-size:108px; font-weight:800; color:#fff; line-height:1.04; letter-spacing:-0.025em; transition-delay:0.18s; }
  #s3c { top:1150px; font-family:'Segoe UI','Arial',sans-serif; font-size:38px; color:rgba(255,255,255,0.5); font-weight:400; font-style:italic; transition-delay:0.36s; }

  /* ── Scene 4 ── */
  #s4a { top:780px; font-family:'Segoe UI','Arial',sans-serif; font-size:30px; font-weight:600; color:rgba(255,255,255,0.45); letter-spacing:0.2em; text-transform:uppercase; }
  #s4b { top:830px; font-size:180px; font-weight:800; color:#FFD700; line-height:0.95; letter-spacing:-0.04em; transition-delay:0.1s; }

  /* ── Scene 5: logo ── */
  #logoWrap {
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%) scale(0.88);
    display:flex; flex-direction:column; align-items:center; gap:24px;
    opacity:0; transition:opacity 0.9s ease, transform 0.9s ease;
  }
  #logoWrap.in { opacity:1; transform:translate(-50%,-50%) scale(1); }
  .lbox {
    width:130px; height:130px; background:#FFD700; border-radius:30px;
    display:flex; align-items:center; justify-content:center;
  }
  .lname { font-size:110px; font-weight:800; color:#FFD700; letter-spacing:-0.025em; line-height:1; }
  .ltag  { font-family:'Segoe UI','Arial',sans-serif; font-size:34px; color:rgba(255,255,255,0.5); letter-spacing:0.06em; }

  /* ── Eye flash ── */
  #eyeFlash {
    position:absolute; top:760px; left:50%; transform:translateX(-50%) scale(0.7);
    font-size:96px; line-height:1; opacity:0;
    transition:opacity 0.4s ease, transform 0.4s ease;
  }
  #eyeFlash.in { opacity:1; transform:translateX(-50%) scale(1); }

  /* progress */
  .prog { position:absolute; bottom:0; left:0; height:5px; background:#FFD700; opacity:0.4; }
</style>
</head>
<body>
<div class="scene" id="scene">
  <div class="bg-glow" id="bgGlow"></div>

  <!-- S1 -->
  <div class="el" id="s1eyebrow">think about it</div>
  <div class="el" id="s1a">do you<br/>really</div>
  <div class="bar-el" id="bar1"></div>
  <div class="el" id="s1b">the people<br/>around you?</div>

  <!-- S2 -->
  <div id="namesBlock">
    <div class="name-row" id="nr1"><span class="person">Sarah</span><span class="trait">· Kind</span></div>
    <div class="name-row" id="nr2"><span class="person">James</span><span class="trait">· Reliable</span></div>
    <div class="name-row" id="nr3"><span class="person">Maya</span><span class="trait">· Funny</span></div>
    <div class="name-row" id="nr4"><span class="person">Omar</span><span class="trait">· Honest</span></div>
  </div>

  <!-- S3 -->
  <div class="el" id="s3a">they have</div>
  <div class="el" id="s3b">thoughts<br/>about you.</div>
  <div class="el" id="s3c">you just can't hear them.</div>

  <!-- S4 -->
  <div class="el" id="s4a">but—</div>
  <div class="el" id="s4b">until<br/>now.</div>

  <!-- Eye -->
  <div id="eyeFlash">👁️</div>

  <!-- S5 -->
  <div id="logoWrap">
    <div class="lbox">
      <svg width="78" height="78" viewBox="0 0 512 512" fill="none">
        <rect x="148" y="88" width="92" height="328" rx="46" fill="#2D1B69"/>
        <rect x="148" y="324" width="220" height="92" rx="46" fill="#2D1B69"/>
        <circle cx="162" cy="180" r="26" stroke="#2D1B69" stroke-width="11"/>
        <circle cx="226" cy="180" r="26" stroke="#2D1B69" stroke-width="11"/>
        <line x1="188" y1="180" x2="200" y2="180" stroke="#2D1B69" stroke-width="11" stroke-linecap="round"/>
        <line x1="136" y1="180" x2="110" y2="189" stroke="#2D1B69" stroke-width="11" stroke-linecap="round"/>
        <line x1="252" y1="180" x2="278" y2="189" stroke="#2D1B69" stroke-width="11" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="lname">Lens</div>
    <div class="ltag">see people clearly.</div>
  </div>

  <div class="prog" id="prog" style="width:0%"></div>
</div>

<script>
const $ = id => document.getElementById(id);
const show = id => { const e=$( id); if(e){e.classList.remove('out');e.classList.add('in');} };
const hide = id => { const e=$(id); if(e){e.classList.remove('in');e.classList.add('out');} };
const rst  = id => { const e=$(id); if(e){e.classList.remove('in','out');} };

window.renderFrame = function(t) {
  const s = t * 15;

  ['bgGlow','s1eyebrow','s1a','s1b','bar1',
   'namesBlock','nr1','nr2','nr3','nr4',
   's3a','s3b','s3c','s4a','s4b',
   'eyeFlash','logoWrap'].forEach(rst);

  $('prog').style.width = (t * 100) + '%';

  // ── Scene 1: 0.5–4.5 ──
  if (s >= 0.3) show('bgGlow');
  if (s >= 0.5) show('s1eyebrow');
  if (s >= 0.8) show('s1a');
  if (s >= 2.0) { show('bar1'); show('s1b'); }

  if (s >= 4.3) ['s1eyebrow','s1a','s1b','bar1'].forEach(hide);

  // ── Scene 2: 4.8–8.8 ──
  if (s >= 4.8) show('namesBlock');
  if (s >= 5.1) show('nr1');
  if (s >= 5.6) show('nr2');
  if (s >= 6.1) show('nr3');
  if (s >= 6.6) show('nr4');
  if (s >= 8.6) hide('namesBlock');

  // ── Scene 3: 9.0–11.2 ──
  if (s >= 9.0) show('s3a');
  if (s >= 9.5) show('s3b');
  if (s >= 10.2) show('s3c');
  if (s >= 11.2) ['s3a','s3b','s3c'].forEach(hide);

  // ── Scene 4: 11.5–13.2 ──
  if (s >= 11.5) show('s4a');
  if (s >= 11.8) show('s4b');
  if (s >= 13.0) ['s4a','s4b'].forEach(hide);

  // ── Eye: 13.2–13.9 ──
  if (s >= 13.2 && s < 13.9) show('eyeFlash');

  // ── Scene 5: 13.7–15 ──
  if (s >= 13.7) show('logoWrap');
};
</script>
</body>
</html>
